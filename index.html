<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css" />
</head>

<body class="bg-[url('./images/bg.jpg')] bg-cover bg-center bg-no-repeat min-h-screen relative overflow-x-hidden">

    <!-- Sidebar Include -->
    <div id="sidebar"></div>

    <!-- Header Include -->
    <div id="header"></div>

    <!-- Hero Section -->
    <section class="max-w-[85%] mx-auto h-[100vh] flex items-center py-3">
        <div class="grid grid-cols-1 lg:grid-cols-2 items-center gap-16 w-full">

            <!-- Left Side -->
            <div class="flex items-center flex-col md:flex-row justify-center lg:justify-start gap-6">
                <img src="./images/smokey-logo.png" alt="Smokey Affair mascot"
                    class="w-40 md:w-48 lg:w-52 object-contain">

                <div class="text-center lg:text-left">
                    <h1
                        class="text-5xl md:text-6xl lg:text-7xl leading-[0.95] font-light uppercase tracking-[4px] text-[#222]">
                        Smokey <br> Affairs
                    </h1>

                    <div
                        class="mt-4 flex flex-wrap items-center justify-center lg:justify-start gap-2 text-[#2a2a2a] uppercase font-extrabold text-base md:text-lg">
                        <span>Order.</span>
                        <span>Chill.</span>
                        <span>Crave.</span>
                        <span>Repeat.</span>
                    </div>
                </div>
            </div>

            <!-- Right Side -->
            <div class="text-center lg:text-left">
                <h2 class="text-[70px] md:text-[90px] lg:text-[110px] leading-none font-light text-[#f2711f]">
                    hello!
                </h2>

                <div class="mt-4 space-y-2 text-[#8d8d8d] text-3xl md:text-4xl lg:text-5xl font-light leading-tight">
                    <p>fruit chillum <span class="text-[#f2711f]">.</span> hookah</p>
                    <p>cigarettes <span class="text-[#f2711f]">.</span> beverage</p>
                    <p>munchies <span class="text-[#f2711f]">.</span> chillum</p>
                </div>

                <div class="mt-8 flex items-center justify-center lg:justify-start gap-6 text-4xl">
                    <span>🍊</span>
                    <span>🚬</span>
                    <span>🍟</span>
                    <span>🥤</span>
                    <span>🍜</span>
                    <span>🪔</span>
                </div>
            </div>

        </div>
    </section>

    <!-- How to Order -->
    <section class="max-w-[85%] mx-auto py-20">
        <h4 class="text-4xl font-semibold text-start mb-10 text-[#f2711f]">How to Order</h4>
        <div class="rounded-3xl overflow-hidden shadow-lg">
            <img src="./images/video.jpg" alt="how to order" class="w-full h-auto object-cover">
        </div>
    </section>

    <section class="max-w-[85%] mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">

            <!-- Card 1 -->
            <div
                class="flex flex-col items-center justify-center text-center gap-3 px-6 py-8 border-4 border-[#d7d7d7] rounded-[2rem] min-h-[180px] bg-transparent">
                <img src="./images/flaver.png" class="h-[55px] w-[55px] object-contain" alt="Choose Your Flavor">
                <h6 class="text-2xl md:text-[1.5rem] font-bold uppercase leading-tight text-black">
                    Choose Your <br> Flavor
                </h6>
            </div>

            <!-- Card 2 -->
            <div
                class="flex flex-col items-center justify-center text-center gap-3 px-6 py-8 border-4 border-[#d7d7d7] rounded-[2rem] min-h-[180px] bg-transparent">
                <img src="./images/smokey.png" class="h-[55px] w-[55px] object-contain" alt="Give Us A Call">
                <h6 class="text-2xl md:text-[1.5rem] font-bold uppercase leading-tight text-black">
                    Give Us A Call
                </h6>
            </div>

            <!-- Card 3 -->
            <div
                class="flex flex-col items-center justify-center text-center gap-3 px-6 py-8 border-4 border-[#d7d7d7] rounded-[2rem] min-h-[180px] bg-transparent">
                <img src="./images/scotter.png" class="h-[55px] w-[55px] object-contain" alt="Delivery">
                <h6 class="text-2xl md:text-[1.5rem] font-bold uppercase leading-tight text-black">
                    Delivery
                </h6>
            </div>

            <!-- Card 4 -->
            <div
                class="flex flex-col items-center justify-center text-center gap-3 px-6 py-8 border-4 border-[#d7d7d7] rounded-[2rem] min-h-[180px] bg-transparent">
                <img src="./images/certain.png" class="h-[55px] w-[55px] object-contain" alt="Catering">
                <h6 class="text-2xl md:text-[1.5rem] font-bold uppercase leading-tight text-black">
                    Catering
                </h6>
            </div>

        </div>
    </section>


    <!-- Footer Include -->
    <div id="footer"></div>



    <script>
        async function loadIncludes() {
            try {
                const sidebar = await fetch('./includes/sidebar.html');
                document.getElementById('sidebar').innerHTML = await sidebar.text();

                const header = await fetch('./includes/header.html');
                document.getElementById('header').innerHTML = await header.text();

                const footer = await fetch('./includes/footer.html');
                document.getElementById('footer').innerHTML = await footer.text();

                // sidebar js after load
                const openMenu = document.getElementById("openMenu");
                const closeMenu = document.getElementById("closeMenu");
                const sideMenu = document.getElementById("sideMenu");
                const menuOverlay = document.getElementById("menuOverlay");

                if (openMenu && closeMenu && sideMenu && menuOverlay) {
                    function showMenu() {
                        sideMenu.classList.remove("-translate-x-full");
                        menuOverlay.classList.remove("opacity-0", "invisible");
                        menuOverlay.classList.add("opacity-100", "visible");
                    }

                    function hideMenu() {
                        sideMenu.classList.add("-translate-x-full");
                        menuOverlay.classList.add("opacity-0", "invisible");
                        menuOverlay.classList.remove("opacity-100", "visible");
                    }

                    openMenu.addEventListener("click", showMenu);
                    closeMenu.addEventListener("click", hideMenu);
                    menuOverlay.addEventListener("click", hideMenu);
                }
            } catch (error) {
                console.error("Include loading error:", error);
            }
        }

        loadIncludes();

        function toggleMenu(id) {
            const menu = document.getElementById(id);
            if (menu) {
                menu.classList.toggle("hidden");
            }
        }
    </script>
</body>

</html>
