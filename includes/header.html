<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <header class="fixed top-0 left-0 w-full z-50 backdrop-blur-md">
        <nav class="max-w-[85%] mx-auto py-4">
            <div class="flex items-center justify-between">

                <!-- menu icon & name -->
                <button id="openMenu" class="flex items-center gap-2 text-[#f2711f]">
                    <i class="hgi hgi-stroke hgi-menu-06 text-2xl font-bold"></i>
                    <div class="hidden md:block">
                        <h4 class="text-2xl uppercase font-semibold">Menu</h4>
                    </div>
                </button>

                <div class="flex items-center gap-4 text-[#222]">
                    <div class="hidden md:flex items-center text-xl gap-2 text-black">
                        <i class="hgi hgi-stroke hgi-call-02 hover:text-[#f2711f] transition cursor-pointer"></i>
                        <span class="text-black">9903191031</span>
                    </div>

                    <div class="flex items-center gap-2 text-xl text-black">
                        <i class="hgi hgi-stroke hgi-facebook-02 hover:text-[#f2711f] transition cursor-pointer"></i>
                        <i class="hgi hgi-stroke hgi-instagram hover:text-[#f2711f] transition cursor-pointer"></i>
                    </div>

                    <div class="text-xl text-black">
                        <i class="hgi hgi-stroke hgi-shopping-cart-02 hover:text-[#f2711f] transition cursor-pointer"></i>
                    </div>
                </div>
            </div>
        </nav>
    </header>
</body>

</html>
